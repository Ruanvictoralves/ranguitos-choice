<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escolha seu parceiro</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;600&display=swap');

  :root{
    --cream:#FFF6E9;
    --ink:#20202C;
    --pokedex-red:#E3350D;
    --gold:#FFC42B;
    --fire:#FF6B3D;
    --grass:#4CAF6D;
    --water:#3E9CE8;
    --card-shadow: 0 18px 40px -12px rgba(32,32,44,.35);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% -10%, rgba(255,196,43,.35), transparent 45%),
      radial-gradient(circle at 110% 10%, rgba(227,53,13,.25), transparent 40%),
      var(--cream);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    overflow-x:hidden;
  }

  .stage{
    width:100%;
    max-width:980px;
    position:relative;
  }

  /* ---------- TOPO ---------- */
  .eyebrow{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-size:13px;
    color:var(--pokedex-red);
    margin-bottom:10px;
  }
  .pokeball-dot{
    width:14px;height:14px;border-radius:50%;
    background:
      linear-gradient(var(--ink) 0 2px, transparent 2px),
      linear-gradient(to bottom, var(--pokedex-red) 50%, #fff 50%);
    border:2px solid var(--ink);
    position:relative;
  }
  .pokeball-dot::after{
    content:"";position:absolute;top:50%;left:50%;
    width:5px;height:5px;background:#fff;border:2px solid var(--ink);
    border-radius:50%;transform:translate(-50%,-50%);
  }

  h1{
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    text-align:center;
    font-size:clamp(28px,5vw,44px);
    margin:0 0 6px;
    line-height:1.1;
  }
  h1 span{color:var(--pokedex-red);}

  .sub{
    text-align:center;
    max-width:520px;
    margin:0 auto 40px;
    color:#5b5b6b;
    font-size:15.5px;
    line-height:1.5;
  }

  /* ---------- CARDS ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:22px;
  }
  @media(max-width:760px){
    .grid{grid-template-columns:1fr; max-width:340px; margin:0 auto;}
  }

  .card{
    --accent: var(--fire);
    background:#fff;
    border-radius:22px;
    padding:26px 20px 22px;
    text-align:center;
    cursor:pointer;
    border:2px solid rgba(0,0,0,.05);
    box-shadow:var(--card-shadow);
    transition:transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, color-mix(in srgb, var(--accent) 14%, transparent), transparent 55%);
    pointer-events:none;
  }
  .card:hover{ transform:translateY(-8px) rotate(-0.4deg); box-shadow:0 26px 50px -14px rgba(32,32,44,.4); }
  .card:active{ transform:translateY(-2px) scale(.98); }
  .card:focus-visible{ outline:3px solid var(--accent); outline-offset:3px; }

  .card.fire{--accent:var(--fire);}
  .card.grass{--accent:var(--grass);}
  .card.water{--accent:var(--water);}

  .art-wrap{
    width:112px;height:112px;
    margin:0 auto 14px;
    border-radius:50%;
    background:color-mix(in srgb, var(--accent) 16%, #fff);
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .art-wrap img{
    width:92px;
    height:92px;
    object-fit:contain;
    display:block;
  }

  .type-tag{
    display:inline-block;
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#fff;
    background:var(--accent);
    padding:3px 10px;
    border-radius:999px;
    margin-bottom:10px;
  }

  .name{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:21px;
    margin:0 0 4px;
  }
  .gift{
    font-size:13.5px;
    color:#6a6a7a;
    margin:0;
    line-height:1.4;
  }
  .gift b{color:var(--ink);}

  .pick-hint{
    margin-top:14px;
    font-size:12.5px;
    font-weight:600;
    color:var(--accent);
    opacity:0;
    transform:translateY(4px);
    transition:opacity .25s, transform .25s;
  }
  .card:hover .pick-hint{opacity:1; transform:translateY(0);}

  /* ---------- TELA DE RESULTADO ---------- */
  .result{
    display:none;
    text-align:center;
    animation:pop .5s cubic-bezier(.2,.9,.25,1.2);
  }
  .result.show{display:block;}
  .grid.hide{display:none;}
  .eyebrow.hide, .sub.hide, h1.hide{display:none;}

  @keyframes pop{
    from{opacity:0; transform:scale(.9) translateY(14px);}
    to{opacity:1; transform:scale(1) translateY(0);}
  }

  .result-badge{
    width:132px;height:132px;
    margin:0 auto 22px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:color-mix(in srgb, var(--r-accent, var(--pokedex-red)) 18%, #fff);
    box-shadow:0 0 0 8px color-mix(in srgb, var(--r-accent, var(--pokedex-red)) 10%, transparent);
  }
  .result-badge img{
    width:108px;
    height:108px;
    object-fit:contain;
    display:block;
  }

  .result h2{
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    font-size:clamp(24px,4.5vw,34px);
    margin:0 0 10px;
  }
  .result h2 span{color:var(--r-accent, var(--pokedex-red));}

  .result-message{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:18px;
    background:#fff;
    border:2px dashed color-mix(in srgb, var(--r-accent, var(--pokedex-red)) 55%, transparent);
    border-radius:16px;
    padding:16px 22px;
    display:inline-block;
    max-width:440px;
    margin:0 0 18px;
    box-shadow:var(--card-shadow);
  }

  .status-line{
    font-size:13px;
    color:#6a6a7a;
    min-height:18px;
  }
  .status-line.ok{color:var(--grass); font-weight:600;}
  .status-line.err{color:var(--pokedex-red); font-weight:600;}

  footer{
    text-align:center;
    margin-top:36px;
    font-size:11.5px;
    color:#a3a3b0;
    letter-spacing:.03em;
  }
</style>
</head>
<body>

<audio id="bgMusic" src="audio/Wild Pokémon Battle - Pokémon Red_Blue_Yellow Soundtrack - Daintii Music (youtube).mp3" autoplay loop preload="auto"></audio>

<div class="stage">

  <div class="eyebrow" id="eyebrow"><span class="pokeball-dot"></span> Presente de Ranguito</div>
  <h1 id="title">Escolha seu <span>parceiro inicial</span></h1>
  <p class="sub" id="subtitle">Assim como em Kanto, chegou a hora de escolher. Toque em um dos três parceiros abaixo — a sua escolha é o seu presente.</p>

  <div class="grid" id="grid">

    <button class="card fire" data-name="Charmander" data-gift="Blister Fogo Fantasmagórico" data-accent="#FF6B3D" data-msg="🔥 Um parceiro ardente, leal e cheio de energia.">
      <div class="art-wrap">
        <img src="images/Pokemon-Charmander-PNG-Pic.png" alt="Charmander">
      </div>
      <span class="type-tag">Fogo</span>
      <p class="name">Charmander</p>
      <p class="pick-hint">Toque para escolher →</p>
    </button>

    <button class="card grass" data-name="Bulbasaur" data-gift="Camiseta" data-accent="#4CAF6D" data-msg="🌿 Firme, tranquilo e sempre com um plano.">
      <div class="art-wrap">
        <img src="images/Bulbasaur-PNG.png" alt="Bulbasaur">
      </div>
      <span class="type-tag">Planta</span>
      <p class="name">Bulbasaur</p>
      <p class="pick-hint">Toque para escolher →</p>
    </button>

    <button class="card water" data-name="Squirtle" data-gift="Gabinete de PC" data-accent="#3E9CE8" data-msg="💧 Prático, resistente e construído para durar.">
      <div class="art-wrap">
        <img src="images/Squirtle-PNG-HD-Image.png" alt="Squirtle">
      </div>
      <span class="type-tag">Água</span>
      <p class="name">Squirtle</p>
      <p class="pick-hint">Toque para escolher →</p>
    </button>

  </div>

  <div class="result" id="result">
    <div class="result-badge" id="resultBadge"></div>
    <h2>Você escolheu <span id="resultName"></span>!</h2>
    <p id="resultFlavor" style="color:#6a6a7a; font-size:14px; margin:0 0 18px;"></p>
    <div class="result-message" id="resultMsg"></div>
    <div class="status-line" id="statusLine">enviando aviso...</div>
  </div>

  <footer>feito com carinho para o seu aniversário 🎂</footer>
</div>

<script>
  const cards = document.querySelectorAll('.card');
  const grid = document.getElementById('grid');
  const eyebrow = document.getElementById('eyebrow');
  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');
  const result = document.getElementById('result');
  const resultBadge = document.getElementById('resultBadge');
  const resultName = document.getElementById('resultName');
  const resultFlavor = document.getElementById('resultFlavor');
  const resultMsg = document.getElementById('resultMsg');
  const statusLine = document.getElementById('statusLine');
  const bgMusic = document.getElementById('bgMusic');

  // >>> IMPORTANTE: troque pelo endpoint do seu formulário Formspree <<<
  // 1. Crie uma conta gratuita em https://formspree.io usando o e-mail ruanzinvic@gmail.com
  // 2. Crie um novo formulário e copie o endpoint (algo como https://formspree.io/f/xxxxxxx)
  // 3. Cole o endpoint na linha abaixo, no lugar de "COLE_SEU_ENDPOINT_AQUI"
  const FORMSPREE_ENDPOINT = "https://formspree.io/f/mgogovbo";

  bgMusic.volume = 0.22;
  bgMusic.play().catch(() => {
    const startMusic = () => {
      bgMusic.play();
      document.removeEventListener('click', startMusic);
      document.removeEventListener('touchstart', startMusic);
    };
    document.addEventListener('click', startMusic);
    document.addEventListener('touchstart', startMusic);
  });

  cards.forEach(card => {
    card.addEventListener('click', () => choose(card));
  });

  async function choose(card){
    const name = card.dataset.name;
    const gift = card.dataset.gift;
    const accent = card.dataset.accent;
    const msg = card.dataset.msg;
    const image = card.querySelector('img').cloneNode();

    // transição visual
    grid.classList.add('hide');
    eyebrow.classList.add('hide');
    title.classList.add('hide');
    subtitle.classList.add('hide');

    result.style.setProperty('--r-accent', accent);
    resultBadge.replaceChildren(image);
    resultName.textContent = name;
    resultFlavor.textContent = msg;
    resultMsg.textContent = `Seu ${name} está chegando! 🎁 (${gift})`;
    result.classList.add('show');

    statusLine.textContent = 'enviando aviso...';
    statusLine.className = 'status-line';

    try{
      if(FORMSPREE_ENDPOINT.includes('COLE_SEU_ENDPOINT_AQUI')){
        throw new Error('endpoint não configurado');
      }
      const res = await fetch(FORMSPREE_ENDPOINT, {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify({
          _subject: `🎉 Escolha do presente: ${name}`,
          pokemon_escolhido: name,
          presente: gift,
          mensagem: `A pessoa escolheu ${name} e vai ganhar: ${gift}`
        })
      });
      if(res.ok){
        statusLine.textContent = 'Aviso enviado com sucesso ✓';
        statusLine.className = 'status-line ok';
      } else {
        throw new Error('falha no envio');
      }
    } catch(e){
      statusLine.textContent = 'Não foi possível enviar o aviso automaticamente.';
      statusLine.className = 'status-line err';
    }
  }
</script>

</body>
</html>
